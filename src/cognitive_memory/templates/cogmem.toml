[cogmem]
# user_id is stored in cogmem.local.toml (gitignored) per user.
# Run 'cogmem init' to set up user isolation.
logs_dir = "memory/logs"
contexts_dir = "memory/contexts"
db_path = "memory/vectors.db"

[cogmem.identity]
soul = "identity/soul.md"
user = "identity/user.md"

[cogmem.knowledge]
summary = "memory/knowledge/summary.md"
error_patterns = "memory/knowledge/error-patterns.md"

[cogmem.session]
recent_logs = 2
prefer_compact = true
token_budget = 6000

[cogmem.crystallization]
pattern_threshold = 3
error_threshold = 5
log_days_threshold = 10
checkpoint_interval_days = 21
last_checkpoint = ""
checkpoint_count = 0

[cogmem.decay]
arousal_threshold = 0.7          # この値以上の Arousal は詳細を永久保持
recall_threshold = 2             # この回数以上想起された記憶は保持候補
recall_window_months = 18        # この期間内に想起がなければ削除
enabled = true                   # false で忘却を無効化

[cogmem.skills]
auto_improve = "auto"  # "auto" | "ask" | "off"

[cogmem.metrics]
total_sessions = 0

[cogmem.scoring]
sim_weight = 0.7
arousal_weight = 0.3
base_half_life = 60.0
decay_floor = 0.3

[cogmem.embedding]
provider = "ollama"
model = "zylonai/multilingual-e5-large"
url = "http://localhost:11434/api/embed"
timeout = 10

[cogmem.behavior]
consecutive_failure_threshold = 2
# skill_gate = true  # デフォルト有効

# ファイル編集時にスキル使用を促すトリガー設定
# [[cogmem.skill_triggers]]
# pattern = "src/components/**"
# skills = ["your-skill-name"]
