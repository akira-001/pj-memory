{% set lang = get_lang(request) %}
<div class="system-section">
    <div class="system-section-header">
        <div>
            <div class="system-section-title">{{ t('system.autostart', lang) }}</div>
            <div class="system-section-desc">{{ t('system.autostart_desc', lang) }}</div>
        </div>
        <div class="status-indicator">
            {% if launchagent.enabled %}
            <span class="status-dot status-dot--running"></span>
            <span style="color: var(--success);">{{ t('system.enabled', lang) }}</span>
            {% else %}
            <span class="status-dot status-dot--stopped"></span>
            <span style="color: var(--error);">{{ t('system.disabled', lang) }}</span>
            {% endif %}
        </div>
    </div>
    <div class="system-actions">
        {% if launchagent.enabled %}
        <button class="btn-sm btn-stop"
                hx-post="/system/launchagent/toggle"
                hx-target="#launchagent-section"
                hx-swap="innerHTML">
            {{ t('system.disabled', lang) }}
        </button>
        {% else %}
        <button class="btn-sm btn-start"
                hx-post="/system/launchagent/toggle"
                hx-target="#launchagent-section"
                hx-swap="innerHTML">
            {{ t('system.enabled', lang) }}
        </button>
        {% endif %}
    </div>
    <div class="system-section-desc" style="margin-top: 0.75rem; font-size: 0.6875rem; word-break: break-all;">
        {{ launchagent.path }}
    </div>
</div>
